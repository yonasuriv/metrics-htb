<body>

    <div class="container py-5">

        <div class="text-center mb-4">
            <h1>󰆧 HTB Machines CheatSheet</h1>
            <p class="subtitle">Visualización de máquinas hackeadas by yonasuriv</p>
        </div>

        <div class="card p-4">
            <div id="loader" class="loader"></div>

            <div class="table-responsive d-none" id="tableContainer">
                <table id="excelTable" class="table w-100"></table>
            </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        async function loadExcel() {
            const response = await fetch("htb_machines_UPDATE.xlsx");
            const data = await response.arrayBuffer();

            const workbook = XLSX.read(data, { type: "array" });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            let json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

            // Invertir filas para que lo último del Excel aparezca primero
            json.reverse();

            // Orden por fecha
            const dateColumn = Object.keys(json[0]).find(col => col.toLowerCase().includes("date"));
            /*if (dateColumn) {
                json.sort((a, b) => {
                    // Si algún valor está vacío, lo ponemos al final
                    if (!a[dateColumn]) return 1;
                    if (!b[dateColumn]) return -1;

                    // Separar día, mes, año
                    const [dayA, monthA, yearA] = a[dateColumn].split("/").map(Number);
                    const [dayB, monthB, yearB] = b[dateColumn].split("/").map(Number);

                    // Crear fechas
                    const dateA = new Date(yearA, monthA - 1, dayA);
                    const dateB = new Date(yearB, monthB - 1, dayB);

                    return dateB - dateA; // descendente: más nuevo primero
                });
            }*/

            createTable(json);
        }

        function getDifficultyBadge(value) {
            if (!value) return `<span class="badge badge-default">${value}</span>`;

            const v = value.toString().toLowerCase().trim();

            if (v.includes("easy")) {
                return `<span class="badge badge-easy">Easy</span>`;
            }

            if (v.includes("intermediate")) {
                return `<span class="badge badge-intermediate">Intermediate</span>`;
            }

            if (v.includes("hard")) {
                return `<span class="badge badge-hard">Hard</span>`;
            }

            if (v.includes("insane")) {
                return `<span class="badge badge-insane">Insane</span>`;
            }

            return `<span class="badge badge-default">${value}</span>`;
        }

        function createTable(data) {
            const table = document.getElementById("excelTable");
            const headers = Object.keys(data[0]);

            let thead = "<thead><tr>";
            headers.forEach(h => {
                thead += `<th>${h}</th>`;
            });
            thead += "</tr></thead>";

            let tbody = "<tbody>";
            data.forEach(row => {
                tbody += "<tr>";
                headers.forEach(h => {
                    let value = row[h];

                    if (h.toLowerCase().includes("nombre")) {
                        value = `<strong>${value}</strong>`;
                    }

                    // 🎯 Detectar columna dificultad automáticamente
                    if (h.toLowerCase().includes("dificultad")) {
                        value = getDifficultyBadge(value);
                    }

                    // 🎯 Columna activa
                    if (h.toLowerCase().includes("activa")) {
                        const isActive =
                            value === true ||
                            value === "TRUE" ||
                            value === "VERDADERO" ||
                            value === 1 ||
                            value === "1";

                        value = isActive
                            ? `<span class="badge bg-success">Activa</span>`
                            : `<span class="badge bg-secondary">Inactiva</span>`;
                    }

                    // 🎯 Columna hecha
                    if (h.toLowerCase().includes("hecha")) {
                        value = value === "✓"
                            ? `<span class="badge bg-primary">Done</span>`
                            : "";
                    }

                    // 🎯 Columna URL
                    if (h.toLowerCase().includes("url")) {
                        value = `<a href="${value}" target="_blank" style="color:#58a6ff;">Abrir</a>`;
                    }

                    // 🎯 Columna OS: Windows azul, Linux naranja como badge
                    if (h.toLowerCase().includes("os")) {
                        if (typeof value === "string") {
                            const v = value.toLowerCase();
                            if (v.includes("windows")) {
                                value = `<span class="badge" style="background-color:#3b82f6; color:white;">󰖳 Windows</span>`;
                            } else if (v.includes("linux")) {
                                value = `<span class="badge" style="background-color:#f97316; color:white;"> Linux</span>`;
                            } else {
                                value = `<span class="badge badge-default">${value}</span>`;
                            }
                        }
                    }

                    // 🎯 Columna fecha
                    if (h.toLowerCase().includes("date") || h.toLowerCase().includes("fecha")) {
                        value = formatExcelDate(value);
                    }

                    // 🎯 Columna técnicas (badges)
                    if (
                        h.toLowerCase().includes("tecnica") ||
                        h.toLowerCase().includes("tech") ||
                        h.toLowerCase().includes("skill")
                    ) {
                        if (typeof value === "string" && value.length > 0) {
                            const items = value.split(/,|;/);
                            value = items.map(item => {
                                return `<span class="${getTechBadge(item)}">${item.trim()}</span>`;
                            }).join(" ");
                        }
                    }

                    tbody += `<td>${value}</td>`;
                });
                tbody += "</tr>";
            });
            tbody += "</tbody>";

            table.innerHTML = thead + tbody;

            $("#excelTable").DataTable({
                pageLength: 10,
                order: [],
                language: {
                    search: "Buscar:",
                    lengthMenu: "Mostrar _MENU_",
                    info: "_START_ - _END_ de _TOTAL_",
                    paginate: {
                        next: "→",
                        previous: "←"
                    }
                }
            });

            document.getElementById("loader").style.display = "none";
            document.getElementById("tableContainer").classList.remove("d-none");
        }

        function getTechBadge(tech) {
            const t = tech.toLowerCase().trim().replace(/\s+/g, "-"); // normaliza el nombre
            return `badge-tech badge-${t}`; // genera clase CSS dinámica
        }

        function formatExcelDate(value) {
            if (!value) return "";

            // Si es número (formato Excel)
            if (!isNaN(value)) {
                const excelEpoch = new Date(1899, 11, 30);
                const date = new Date(excelEpoch.getTime() + value * 86400000);

                return date.toLocaleDateString("es-ES", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric"
                });
            }

            // Si ya es fecha normal
            const parsed = new Date(value);
            if (!isNaN(parsed)) {
                return parsed.toLocaleDateString("es-ES", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric"
                });
            }

            return value;
        }

        loadExcel();
    </script>
