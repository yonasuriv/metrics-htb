<body>

    <div class="container py-5">

        <div class="text-center mb-4">
            <h1>󰆧  HTB Machines CheatSheet</h1>
            <p class="subtitle">Pwned machines overview</p>
        </div>

        <div id="errorBox" class="alert alert-danger d-none mb-3" role="alert"></div>

        <div id="filePickerBox" class="card p-4 mb-3 d-none">
            <p class="mb-3 text-secondary">
                Open this page via a local server, or load your spreadsheet manually:
            </p>
            <code class="d-block mb-3">python3 -m http.server 8080</code>
            <label for="xlsxInput" class="form-label">Load <code>htb_machines.xlsx</code></label>
            <input type="file" id="xlsxInput" class="form-control" accept=".xlsx,.xls">
        </div>

        <div class="card p-4">
            <div id="loader" class="loader"></div>

            <div class="table-responsive d-none" id="tableContainer">
                <table id="excelTable" class="table w-100"></table>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <script>
        const XLSX_FILE = "htb_machines.xlsx";

        const HEADER_LABELS = {
            nombre: "Name",
            name: "Name",
            titulo: "Title",
            title: "Title",
            os: "OS",
            dificultad: "Difficulty",
            difficulty: "Difficulty",
            tecnicas: "Techniques",
            techniques: "Techniques",
            tech: "Techniques",
            skills: "Techniques",
            fecha: "Date",
            date: "Date",
            activa: "Active",
            active: "Active",
            url: "URL",
            hecha: "Done",
            done: "Done",
        };

        let dataTableInstance = null;

        function showError(message) {
            const box = document.getElementById("errorBox");
            box.textContent = message;
            box.classList.remove("d-none");
            document.getElementById("loader").style.display = "none";
        }

        function hideFilePicker() {
            document.getElementById("filePickerBox").classList.add("d-none");
        }

        function showFilePicker() {
            document.getElementById("filePickerBox").classList.remove("d-none");
            document.getElementById("loader").style.display = "none";
        }

        function hideLoaderShowTable() {
            document.getElementById("loader").style.display = "none";
            document.getElementById("tableContainer").classList.remove("d-none");
        }

        function normalizeHeader(header) {
            return header.toString().toLowerCase().trim();
        }

        function displayHeader(header) {
            const key = normalizeHeader(header);
            return HEADER_LABELS[key] || header;
        }

        function headerMatches(header, ...needles) {
            const key = normalizeHeader(header);
            return needles.some((needle) => key.includes(needle));
        }

        function parseWorkbook(arrayBuffer) {
            const workbook = XLSX.read(arrayBuffer, { type: "array", cellDates: true });
            const sheetName = workbook.SheetNames[0];
            if (!sheetName) {
                throw new Error("No worksheet found in the spreadsheet.");
            }

            const sheet = workbook.Sheets[sheetName];
            let json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

            if (!json.length) {
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
                const headerRow = rows[0];
                if (headerRow?.length) {
                    const empty = {};
                    headerRow.forEach((header) => {
                        if (header !== "") {
                            empty[header] = "";
                        }
                    });
                    if (Object.keys(empty).length) {
                        return [];
                    }
                }
                throw new Error("The spreadsheet has no header row.");
            }

            json.reverse();
            return json;
        }

        async function loadExcelFromUrl() {
            const response = await fetch(XLSX_FILE);
            if (!response.ok) {
                throw new Error(`Could not load ${XLSX_FILE} (HTTP ${response.status}).`);
            }
            const data = await response.arrayBuffer();
            createTable(parseWorkbook(data));
        }

        function loadExcelFromFile(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    document.getElementById("errorBox").classList.add("d-none");
                    createTable(parseWorkbook(event.target.result));
                } catch (err) {
                    console.error(err);
                    showError(err.message || "Failed to read the selected spreadsheet.");
                }
            };
            reader.onerror = () => showError("Failed to read the selected file.");
            reader.readAsArrayBuffer(file);
        }

        async function initDashboard() {
            if (typeof XLSX === "undefined") {
                showError("Failed to load the XLSX library. Check your network connection.");
                return;
            }

            document.getElementById("xlsxInput").addEventListener("change", (event) => {
                const file = event.target.files?.[0];
                if (file) {
                    loadExcelFromFile(file);
                }
            });

            if (window.location.protocol === "file:") {
                showFilePicker();
                showError(
                    "Browsers block loading local spreadsheets from file://. Start a local server or use the file picker below."
                );
                return;
            }

            try {
                await loadExcelFromUrl();
            } catch (err) {
                console.error(err);
                showFilePicker();
                showError(
                    `${err.message} Start a server from src/ctrl_dashboard or choose your .xlsx file below.`
                );
            }
        }

        function getDifficultyBadge(value) {
            if (!value) return `<span class="badge badge-default">${value}</span>`;

            const v = value.toString().toLowerCase().trim();

            if (v.includes("easy")) {
                return `<span class="badge badge-easy">Easy</span>`;
            }

            if (v.includes("intermediate")) {
                return `<span class="badge badge-intermediate">Intermediate</span>`;
            }

            if (v.includes("hard")) {
                return `<span class="badge badge-hard">Hard</span>`;
            }

            if (v.includes("insane")) {
                return `<span class="badge badge-insane">Insane</span>`;
            }

            return `<span class="badge badge-default">${value}</span>`;
        }

        function createTable(data) {
            if (!Array.isArray(data)) {
                showError("No rows to display.");
                return;
            }

            if (!data.length) {
                showError("Spreadsheet loaded — add machine rows to htb_machines.xlsx and reload.");
                hideFilePicker();
                document.getElementById("loader").style.display = "none";
                return;
            }

            if (typeof $ === "undefined" || !$.fn?.DataTable) {
                showError("Failed to load table dependencies. Check your network connection.");
                return;
            }

            const table = document.getElementById("excelTable");
            const headers = Object.keys(data[0]);

            let thead = "<thead><tr>";
            headers.forEach((h) => {
                thead += `<th>${displayHeader(h)}</th>`;
            });
            thead += "</tr></thead>";

            let tbody = "<tbody>";
            data.forEach((row) => {
                tbody += "<tr>";
                headers.forEach((h) => {
                    let value = row[h];

                    if (headerMatches(h, "nombre", "name")) {
                        value = `<strong>${value}</strong>`;
                    }

                    if (headerMatches(h, "dificultad", "difficulty")) {
                        value = getDifficultyBadge(value);
                    }

                    if (headerMatches(h, "activa", "active")) {
                        const isActive =
                            value === true ||
                            value === "TRUE" ||
                            value === "VERDADERO" ||
                            value === "True" ||
                            value === 1 ||
                            value === "1";

                        value = isActive
                            ? `<span class="badge bg-success">Active</span>`
                            : `<span class="badge bg-secondary">Inactive</span>`;
                    }

                    if (headerMatches(h, "hecha", "done")) {
                        value = value === "✓" || value === true || value === "TRUE" || value === 1 || value === "1"
                            ? `<span class="badge bg-primary">Done</span>`
                            : "";
                    }

                    if (headerMatches(h, "url")) {
                        if (value) {
                            value = `<a href="${value}" target="_blank" rel="noopener noreferrer" style="color:#58a6ff;">Open</a>`;
                        }
                    }

                    if (normalizeHeader(h) === "os") {
                        if (typeof value === "string") {
                            const v = value.toLowerCase();
                            if (v.includes("windows")) {
                                value = `<span class="badge" style="background-color:#3b82f6; color:white;">󰖳 Windows</span>`;
                            } else if (v.includes("linux")) {
                                value = `<span class="badge" style="background-color:#f97316; color:white;"> Linux</span>`;
                            } else {
                                value = `<span class="badge badge-default">${value}</span>`;
                            }
                        }
                    }

                    if (headerMatches(h, "date", "fecha")) {
                        value = formatExcelDate(value);
                    }

                    if (headerMatches(h, "tecnica", "tech", "skill")) {
                        if (typeof value === "string" && value.length > 0) {
                            const items = value.split(/,|;/);
                            value = items.map((item) => {
                                return `<span class="${getTechBadge(item)}">${item.trim()}</span>`;
                            }).join(" ");
                        }
                    }

                    tbody += `<td>${value ?? ""}</td>`;
                });
                tbody += "</tr>";
            });
            tbody += "</tbody>";

            if (dataTableInstance) {
                dataTableInstance.destroy();
                dataTableInstance = null;
            }

            table.innerHTML = thead + tbody;

            dataTableInstance = $("#excelTable").DataTable({
                pageLength: 10,
                order: [],
                language: {
                    search: "Search:",
                    lengthMenu: "Show _MENU_ entries",
                    info: "Showing _START_ to _END_ of _TOTAL_ entries",
                    infoEmpty: "Showing 0 entries",
                    zeroRecords: "No matching entries found",
                    paginate: {
                        next: "Next",
                        previous: "Previous",
                    },
                },
            });

            hideFilePicker();
            hideLoaderShowTable();
        }

        function getTechBadge(tech) {
            const t = tech.toLowerCase().trim().replace(/\s+/g, "-"); // normaliza el nombre
            return `badge-tech badge-${t}`; // genera clase CSS dinámica
        }

        function formatExcelDate(value) {
            if (!value) return "";

            if (value instanceof Date && !isNaN(value)) {
                return value.toLocaleDateString("en-US", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric",
                });
            }

            if (!isNaN(value)) {
                const excelEpoch = new Date(1899, 11, 30);
                const date = new Date(excelEpoch.getTime() + Number(value) * 86400000);

                return date.toLocaleDateString("en-US", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric",
                });
            }

            const parsed = new Date(value);
            if (!isNaN(parsed)) {
                return parsed.toLocaleDateString("en-US", {
                    day: "2-digit",
                    month: "short",
                    year: "numeric",
                });
            }

            return value;
        }

        initDashboard();
    </script>
