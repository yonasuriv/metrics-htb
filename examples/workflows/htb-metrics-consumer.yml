# Copy to YOUR profile repo:  .github/workflows/htb-metrics.yml
# Template: examples/workflows/htb-metrics-consumer.yml
# Docs: docs/guides/badge-github-actions.md

name: HTB Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      template:
        description: Template to generate
        required: false
        default: classic
        type: choice
        options:
          - classic
          - compact
          - profile-card
          - rank-card
          - season-card
          - terminal
          - hacker-red
          - hacker-yellow
          - light
          - minimal
          - github-classic
          - github-plugin
      htb_ctrl_ref:
        description: yonasuriv/htb-ctrl git ref (branch, tag, or SHA)
        required: false
        default: main
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v6

      - name: Checkout htb-ctrl
        uses: actions/checkout@v6
        with:
          repository: yonasuriv/htb-ctrl
          ref: ${{ github.event.inputs.htb_ctrl_ref || 'main' }}
          path: _htb-ctrl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: _htb-ctrl/pyproject.toml

      - name: Install dependencies
        run: pip install -r _htb-ctrl/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Validate config
        env:
          HTB_PROFILE_ID: ${{ secrets.HTB_PROFILE_ID }}
        run: |
          if [ -z "$HTB_PROFILE_ID" ]; then
            echo "ERROR: HTB_PROFILE_ID secret is not set."
            echo "Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Generate metrics
        env:
          HTB_PROFILE_ID: ${{ secrets.HTB_PROFILE_ID }}
          HTB_API_TOKEN: ${{ secrets.HTB_API_TOKEN }}
          HTB_TOKEN: ${{ secrets.HTB_TOKEN }}
          HTB_BEARER: ${{ secrets.HTB_BEARER }}
        run: |
          TEMPLATE="${{ github.event.inputs.template || 'classic' }}"
          python _htb-ctrl/htbctrl.py badges generate \
            -p "$HTB_PROFILE_ID" \
            -t "$TEMPLATE"

      - name: Commit if changed
        run: |
          git config user.name "htb-metrics[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "user/${HTB_PROFILE_ID}/badges/"
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update HTB metrics [skip ci]"
            git push
          fi
