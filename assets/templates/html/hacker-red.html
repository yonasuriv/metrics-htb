<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>HTB Hacker</title></head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: ui-monospace, 'Courier New', monospace; }
  .badge {
    width: 820px; background: #0d0000; border-radius: 12px;
    border: 1px solid rgba(255,30,30,.4); padding: 22px 26px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 0 40px rgba(255,0,0,.15);
  }
  .header { display: flex; align-items: center; gap: 20px; }
  .avatar { width: 110px; height: 110px; border-radius: 50%;
    border: 2px solid #ff1e1e; overflow: hidden; flex-shrink: 0;
    box-shadow: 0 0 16px rgba(255,30,30,.4); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .name { color: #ff1e1e; font-size: 32px; font-weight: 700; text-shadow: 0 0 10px rgba(255,30,30,.5); }
  .rank { color: #cc0000; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
  .sub { color: #440000; font-size: 11px; margin-top: 3px; }
  .stats { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .stat { display: flex; align-items: center; gap: 5px; color: #cc0000; font-size: 20px; font-weight: 700; }
  .stat img { width: 20px; height: 20px; filter: hue-rotate(120deg) saturate(3) brightness(0.7); }
  .global { color: #ff1e1e; font-size: 24px; font-weight: 700; }
  .divider { height: 1px; background: rgba(255,30,30,.15); }
  .bottom { display: flex; align-items: center; justify-content: space-between; }
  .logo img { height: 16px; filter: brightness(0.2) sepia(1) saturate(5) hue-rotate(-10deg); }
  .meta { color: #440000; font-size: 9px; text-align: right; line-height: 1.5; }
</style>
<body>
<div class="badge">
  <div class="header">
    <div class="avatar"><img src="$user_avatar$" alt="Avatar"></div>
    <div style="flex:1">
      <div class="name">$user_name$</div>
      <div class="rank">$user_rank$ · Lv.$level_number$ $level_title$</div>
      <div class="sub">$season_league$ #$season_rank$$season_rank_suffix$ · Global #$user_ranking$</div>
      <div class="stats">
        <span class="stat"><img src="../assets/vendor/icons/ic-userflag.svg">$user_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-rootflag.svg">$user_system_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-userblood.svg">$user_bloods$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-points.svg">$user_points$</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="bottom">
    <div class="logo"><img src="../assets/vendor/brand/logo-htb.svg" alt="HTB"></div>
    <div class="meta">Last activity: $last_activity$<br>Updated: $last_update$</div>
  </div>
</div>
</body>
</html>
