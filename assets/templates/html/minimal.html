<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>HTB Badge</title></head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: ui-monospace, 'Courier New', monospace; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: #111927; border-radius: 8px; padding: 10px 16px;
    border: 1px solid rgba(159,239,0,.3);
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
  }
  .avatar { width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid #9fef00; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .name { color: #a4b1cd; font-size: 14px; font-weight: 600; }
  .sep { color: #4b5563; font-size: 14px; }
  .rank { color: #9fef00; font-size: 13px; font-weight: 600; text-transform: uppercase; }
  .stats { display: flex; gap: 8px; align-items: center; }
  .s { display: flex; align-items: center; gap: 3px; color: #a4b1cd; font-size: 13px; font-weight: 600; }
  .s img { width: 14px; height: 14px; }
  .logo { margin-left: 6px; }
  .logo img { height: 12px; filter: brightness(0.6); }
</style>
<body>
<div class="badge">
  <div class="avatar"><img src="$user_avatar$" alt=""></div>
  <span class="name">$user_name$</span>
  <span class="sep">·</span>
  <span class="rank">$user_rank$</span>
  <span class="sep">·</span>
  <div class="stats">
    <span class="s"><img src="../assets/vendor/icons/ic-userflag.svg">$user_owns$</span>
    <span class="s"><img src="../assets/vendor/icons/ic-rootflag.svg">$user_system_owns$</span>
    <span class="s"><img src="../assets/vendor/icons/ic-points.svg">$user_points$</span>
  </div>
  <div class="logo"><img src="../assets/vendor/brand/logo-htb.svg" alt="HTB"></div>
</div>
</body>
</html>
