<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>HTB Metrics</title></head>
<style>
  :root {
    --bg: #111927; --primary: #9fef00; --secondary: #a4b1cd;
    --text: #ffffff; --mute: #4b5563; --w: 820px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: ui-monospace, 'Courier New', monospace; }
  .badge {
    width: var(--w); background: var(--bg); border-radius: 20px;
    padding: 24px 28px 18px; display: flex; flex-direction: column;
    gap: 14px; box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .header { display: flex; align-items: center; gap: 22px; }
  .avatar {
    width: 140px; height: 140px; border-radius: 50%;
    border: 3px dashed var(--primary); overflow: hidden; flex-shrink: 0;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .info { flex: 1; }
  .username { color: var(--secondary); font-size: 34px; font-weight: 700; line-height: 1.1; }
  .legacy-rank { color: var(--primary); font-size: 15px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }
  .sub { color: var(--mute); font-size: 12px; text-transform: uppercase;
    letter-spacing: 1px; margin-top: 2px; }
  .stats { display: flex; gap: 18px; margin-top: 12px; align-items: center; }
  .stat { display: flex; align-items: center; gap: 5px;
    color: var(--secondary); font-size: 20px; font-weight: 600; }
  .stat img { width: 22px; height: 22px; }
  .global-rank { color: var(--mute); font-size: 22px; font-weight: 700;
    white-space: nowrap; }
  .footer { display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid rgba(164,177,205,.12); padding-top: 10px; }
  .htb-logo img { height: 18px; width: auto; filter: brightness(0.8); }
  .footer-meta { color: var(--mute); font-size: 10px; text-align: right;
    line-height: 1.5; }
</style>
<body>
<div class="badge">
  <div class="header">
    <div class="avatar"><img src="$user_avatar$" alt="Avatar"></div>
    <div class="info">
      <div class="username">$user_name$</div>
      <div class="legacy-rank">$user_rank$</div>
      <div class="sub">Lv.$level_number$ $level_title$ &nbsp;·&nbsp; $season_league$ $season_rank$$season_rank_suffix$</div>
      <div class="stats">
        <span class="stat"><img src="../assets/vendor/icons/ic-userflag.svg" alt="User">$user_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-rootflag.svg" alt="Root">$user_system_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-points.svg" alt="Pts">$user_points$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-respect.svg" alt="Rep">$user_respects$</span>
      </div>
    </div>
    <div class="global-rank">#$user_ranking$</div>
  </div>
  <div class="footer">
    <div class="htb-logo"><img src="../assets/vendor/brand/logo-htb.svg" alt="Hack The Box"></div>
    <div class="footer-meta">
      Last activity: $last_activity$<br>Updated: $last_update$
    </div>
  </div>
</div>
</body>
</html>
