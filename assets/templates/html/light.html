<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>HTB Metrics</title></head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: ui-sans-serif, system-ui, sans-serif; }
  .badge {
    width: 820px; background: #ffffff; border-radius: 16px;
    border: 1px solid #e5e7eb; padding: 22px 26px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
  }
  .header { display: flex; align-items: center; gap: 18px; }
  .avatar { width: 100px; height: 100px; border-radius: 50%;
    border: 2px dashed #9fef00; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .name { color: #111827; font-size: 28px; font-weight: 700; }
  .rank { color: #16a34a; font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; margin-top: 3px; }
  .sub { color: #6b7280; font-size: 11px; margin-top: 2px; }
  .stats { display: flex; gap: 16px; margin-top: 10px; }
  .stat { display: flex; align-items: center; gap: 5px; color: #374151;
    font-size: 18px; font-weight: 600; }
  .stat img { width: 20px; height: 20px; }
  .global { color: #111827; font-size: 22px; font-weight: 700; }
  .divider { height: 1px; background: #f3f4f6; }
  .footer { display: flex; align-items: center; justify-content: space-between; }
  .logo img { height: 16px; }
  .meta { color: #9ca3af; font-size: 10px; text-align: right; line-height: 1.5; }
</style>
<body>
<div class="badge">
  <div class="header">
    <div class="avatar"><img src="$user_avatar$" alt="Avatar"></div>
    <div style="flex:1">
      <div class="name">$user_name$</div>
      <div class="rank">$user_rank$ · Lv.$level_number$ $level_title$</div>
      <div class="sub">$season_league$ League · #$user_ranking$ Global</div>
      <div class="stats">
        <span class="stat"><img src="../assets/vendor/icons/ic-userflag.svg">$user_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-rootflag.svg">$user_system_owns$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-points.svg">$user_points$</span>
        <span class="stat"><img src="../assets/vendor/icons/ic-respect.svg">$user_respects$</span>
      </div>
    </div>
    <div class="global">#$user_ranking$</div>
  </div>
  <div class="divider"></div>
  <div class="footer">
    <div class="logo"><img src="../assets/vendor/brand/logo-htb-on-light.svg" alt="Hack The Box"></div>
    <div class="meta">Last activity: $last_activity$<br>Updated: $last_update$</div>
  </div>
</div>
</body>
</html>
