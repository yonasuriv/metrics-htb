<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>HTB Rank Card</title></head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: ui-monospace, 'Courier New', monospace; }
  .badge {
    width: 480px; background: #111927; border-radius: 16px;
    padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
  }
  .top { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 60px; height: 60px; border-radius: 50%;
    border: 2px dashed #9fef00; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .name { color: #a4b1cd; font-size: 22px; font-weight: 700; }
  .legacy { color: #9fef00; font-size: 11px; text-transform: uppercase;
    letter-spacing: 2px; margin-top: 3px; }
  .ranks { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .r { background: #0d1117; border-radius: 10px; padding: 10px 12px;
    border: 1px solid rgba(164,177,205,.1); }
  .r-label { color: #4b5563; font-size: 9px; text-transform: uppercase;
    letter-spacing: 1px; }
  .r-val { color: #9fef00; font-size: 22px; font-weight: 700; margin-top: 2px; }
  .r-sub { color: #4b5563; font-size: 9px; margin-top: 1px; }
  .footer { display: flex; justify-content: space-between; align-items: center; }
  .logo img { height: 14px; filter: brightness(0.6); }
  .meta { color: #4b5563; font-size: 9px; }
</style>
<body>
<div class="badge">
  <div class="top">
    <div class="avatar"><img src="$user_avatar$" alt="Avatar"></div>
    <div>
      <div class="name">$user_name$</div>
      <div class="legacy">$user_rank$</div>
    </div>
  </div>
  <div class="ranks">
    <div class="r">
      <div class="r-label">Global Rank</div>
      <div class="r-val">#$user_ranking$</div>
    </div>
    <div class="r">
      <div class="r-label">Experience</div>
      <div class="r-val">Lv.$level_number$</div>
      <div class="r-sub">$level_title$</div>
    </div>
    <div class="r">
      <div class="r-label">$season_name$</div>
      <div class="r-val">$season_league$</div>
      <div class="r-sub">#$season_rank$$season_rank_suffix$</div>
    </div>
  </div>
  <div class="footer">
    <div class="logo"><img src="../images/logo-htb.svg" alt="HTB"></div>
    <div class="meta">Updated: $last_update$</div>
  </div>
</div>
</body>
</html>
